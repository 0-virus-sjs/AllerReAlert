name: E2E Tests (Nightly)

on:
  schedule:
    - cron: '0 17 * * *'   # 매일 02:00 KST (UTC+9) = 17:00 UTC
  workflow_dispatch:        # 수동 실행 가능
    inputs:
      base_url:
        description: 'Frontend URL (override)'
        required: false
      api_url:
        description: 'API URL (override)'
        required: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          BASE_URL:  ${{ inputs.base_url  || vars.E2E_BASE_URL  || 'https://allerrealert.vercel.app' }}
          API_URL:   ${{ inputs.api_url   || vars.E2E_API_URL   || 'https://api.allerrealert.kr/api/v1' }}
          TEST_STUDENT_EMAIL:         ${{ secrets.TEST_STUDENT_EMAIL }}
          TEST_STUDENT_PASSWORD:      ${{ secrets.TEST_STUDENT_PASSWORD }}
          TEST_NUTRITIONIST_EMAIL:    ${{ secrets.TEST_NUTRITIONIST_EMAIL }}
          TEST_NUTRITIONIST_PASSWORD: ${{ secrets.TEST_NUTRITIONIST_PASSWORD }}
          TEST_ADMIN_EMAIL:           ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD:        ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_STAFF_EMAIL:           ${{ secrets.TEST_STAFF_EMAIL }}
          TEST_STAFF_PASSWORD:        ${{ secrets.TEST_STAFF_PASSWORD }}
        run: npm test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: e2e/playwright-report/
          retention-days: 14
