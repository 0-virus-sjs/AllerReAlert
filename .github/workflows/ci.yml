name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

# main 브랜치 직접 push는 CI만 실행 (실제 prod 배포는 Railway/Vercel 자동 연동)
# dev → staging 자동, main → prod 자동 (Railway/Vercel GitHub 연동 설정)

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test -- --reporter=verbose
      - name: Build
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.sha }}

      # main 브랜치 빌드 시 Sentry source map 업로드 (T-115)
      - name: Upload Sentry source maps
        if: github.ref == 'refs/heads/main' && env.SENTRY_AUTH_TOKEN != ''
        run: |
          npx @sentry/cli releases new "${{ github.sha }}"
          npx @sentry/cli releases files "${{ github.sha }}" upload-sourcemaps ./dist --rewrite
          npx @sentry/cli releases finalize "${{ github.sha }}"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG:        ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT:    ${{ vars.SENTRY_FE_PROJECT }}

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate || true  # 모델 없는 M0에서 무시, M1 이후 정상 동작
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --coverage
