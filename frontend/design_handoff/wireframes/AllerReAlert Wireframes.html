<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AllerReAlert — Wireframes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Caveat:wght@500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F6FFDC; font-family: 'Noto Sans KR', 'Noto Sans', sans-serif; }
    /* Sketch style helpers */
    .wf-box { background: #fff; border: 1.5px solid #3A3030; }
    .wf-fill { background: #CFECF3; border: 1.5px solid #A8D8E8; }
    .wf-dark { background: #2BA8D8; color: #F0F8FF; }
    .wf-label { font-family: 'Noto Sans KR', 'Noto Sans', sans-serif; font-size: 11px; color: #7A6070; }
    .wf-title { font-family: 'Noto Sans KR', 'Noto Sans', sans-serif; font-weight: 600; font-size: 13px; color: #3A3030; }
    .wf-badge-red { background: #E06080; color: #fff; border-radius: 3px; font-size: 10px; padding: 1px 5px; font-family: 'Noto Sans KR', 'Noto Sans', sans-serif; font-weight: 600; }
    .wf-badge-orange { background: #7ABCDB; color: #fff; border-radius: 3px; font-size: 10px; padding: 1px 5px; font-family: 'Noto Sans KR', 'Noto Sans', sans-serif; font-weight: 600; }
    .wf-badge-green { background: #5DBD6A; color: #fff; border-radius: 3px; font-size: 10px; padding: 1px 5px; font-family: 'Noto Sans KR', 'Noto Sans', sans-serif; font-weight: 600; }
    .wf-divider { border: none; border-top: 1px dashed #CFECF3; margin: 6px 0; }
    .wf-anno { font-family: 'Noto Sans KR', 'Noto Sans', sans-serif; font-size: 11px; color: #5090B0; border-left: 2px solid #A8D8E8; padding-left: 6px; margin-top: 4px; }
    .wf-screen-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #888; letter-spacing: 0.04em; margin-bottom: 4px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../design-canvas.jsx"></script>
<script type="text/babel" src="../tweaks-panel.jsx"></script>
<script type="text/babel">
/* ─── Shared tiny UI helpers ─── */
const Box = ({ w, h, label, style, className, children }) => (
  <div className={`wf-box ${className||''}`}
    style={{ width: w, height: h, display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden', position:'relative', flexShrink:0, ...style }}>
    {label && <span className="wf-label">{label}</span>}
    {children}
  </div>
);
const Fill = ({ w, h, label, style, children }) => (
  <div className="wf-fill" style={{ width:w, height:h, display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden', flexShrink:0, ...style }}>
    {label && <span className="wf-label">{label}</span>}
    {children}
  </div>
);
const Dark = ({ w, h, label, style, children }) => (
  <div className="wf-dark" style={{ width:w, height:h, display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden', borderRadius:2, flexShrink:0, ...style }}>
    {label && <span style={{fontFamily:"'Noto Sans KR','Noto Sans',sans-serif",fontSize:13,color:'#aaa'}}>{label}</span>}
    {children}
  </div>
);
const Btn = ({ label, primary, danger, small, style }) => (
  <div style={{ display:'inline-flex', alignItems:'center', justifyContent:'center',
    padding: small ? '3px 10px' : '5px 14px',
    border: `1.5px solid ${danger ? '#E06080' : '#3A3030'}`,
    background: primary ? '#CFECF3' : danger ? '#F97B8B' : 'transparent',
    color: primary||danger ? '#3A3030' : '#3A3030',
    fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontSize: small ? 10 : 12, borderRadius:3, cursor:'default', flexShrink:0, ...style }}>
    {label}
  </div>
);
const Input = ({ placeholder, w, h, style }) => (
  <div className="wf-box" style={{ width:w||'100%', height:h||24, display:'flex', alignItems:'center', padding:'0 8px', flexShrink:0, ...style }}>
    <span className="wf-label">{placeholder}</span>
  </div>
);
const Row = ({ children, gap=6, style }) => (
  <div style={{ display:'flex', flexDirection:'row', alignItems:'center', gap, ...style }}>{children}</div>
);
const Col = ({ children, gap=6, style }) => (
  <div style={{ display:'flex', flexDirection:'column', gap, ...style }}>{children}</div>
);
const SLabel = ({ text }) => <div className="wf-screen-label">{text}</div>;
const Anno = ({ text }) => <div className="wf-anno">{text}</div>;
const Divider = () => <hr className="wf-divider" />;
const WTitle = ({ text }) => <div className="wf-title">{text}</div>;

/* ─── ALLERGEN BADGES ─── */
const AllergenBadge = ({ name, warn }) => (
  <span style={{ display:'inline-flex', alignItems:'center', gap:2,
    background: warn ? '#FDDDE8' : '#E8E4DE',
    border: `1px solid ${warn ? '#E06080' : '#C0BBB4'}`,
    borderRadius:3, padding:'1px 5px', fontSize:10, fontFamily:"'Noto Sans KR','Noto Sans',sans-serif",
    color: warn ? '#C04060' : '#6B6560', flexShrink:0 }}>
    {warn && '⚠ '}{name}
  </span>
);

/* ─── SIDEBAR NAV (Nutritionist / Admin) ─── */
const SidebarNav = ({ role='영양사', items=[], active=0 }) => (
  <div style={{ width:140, height:'100%', display:'flex', flexDirection:'column', padding:'12px 0', gap:0, flexShrink:0, background:'#CFECF3', color:'#3A3030' }}>
    <div style={{ padding:'0 12px 12px', borderBottom:'1px solid #333' }}>
      <div style={{ fontFamily:'Caveat', fontWeight:600, fontSize:14, color:'#3A3030' }}>AllerReAlert</div>
      <div style={{ fontFamily:'Caveat', fontSize:11, color:'#888', marginTop:2 }}>{role}</div>
    </div>
    {items.map((item, i) => (
      <div key={i} style={{ padding:'6px 12px', background: i===active ? 'rgba(255,255,255,0.18)' : 'transparent',
        borderLeft: i===active ? '2px solid #7ADDF5' : '2px solid transparent',
        fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontSize:11, color: i===active ? '#3A3030' : '#777', cursor:'default' }}>
        {item}
      </div>
    ))}
  </div>
);

/* ─── TOP TAB NAV (Student/Staff) ─── */
const TopNav = ({ tabs=[], active=0 }) => (
  <div style={{ width:'100%', height:36, borderBottom:'1.5px solid #3A3030', display:'flex', alignItems:'flex-end', gap:0, background:'#FAFEFF', flexShrink:0 }}>
    <div style={{ marginLeft:12, marginRight:'auto', fontFamily:'Caveat', fontWeight:600, fontSize:14, paddingBottom:6, color:'#3A3030' }}>AllerReAlert</div>
    {tabs.map((t, i) => (
      <div key={i} style={{ padding:'6px 12px', fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontSize:11,
        borderBottom: i===active ? '2px solid #44C1F2' : '2px solid transparent',
        color: i===active ? '#3A7090' : '#888', cursor:'default' }}>{t}</div>
    ))}
    <div style={{ padding:'6px 10px' }}><Fill w={22} h={22} style={{borderRadius:'50%'}} label="" /></div>
  </div>
);

/* ─── MOBILE BOTTOM TAB ─── */
const MobileBottomNav = ({ tabs=[], active=0 }) => (
  <div style={{ width:'100%', height:44, borderTop:'1.5px solid #3A3030', display:'flex', alignItems:'center', background:'#FAFEFF', flexShrink:0 }}>
    {tabs.map((t, i) => (
      <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:2 }}>
        <Fill w={18} h={18} style={{ borderRadius:3 }} />
        <span style={{ fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontSize:9, color: i===active ? '#3A3030' : '#999' }}>{t}</span>
      </div>
    ))}
  </div>
);

/* ═══════════════════════════════════════════════════
   SCR-001 / SCR-002  로그인 & 회원가입
═══════════════════════════════════════════════════ */
const LoginScreenA = () => (
  <Col gap={0} style={{ width:320, height:480, background:'#FAFFF0', border:'1.5px solid #C8D8A0', overflow:'hidden' }}>
    <SLabel text="SCR-001 · 로그인 · 데스크탑 A" />
    <div style={{ background:'#CFECF3', width:'100%', height:80, display:'flex', justifyContent:'flex-start', padding:'16px 20px', flexDirection:'column', alignItems:'flex-start', flexShrink:0 }}>
      <div style={{ fontFamily:'Caveat', fontWeight:600, fontSize:22, color:'#3A3030' }}>AllerReAlert</div>
      <div style={{ fontFamily:'Caveat', fontSize:12, color:'#7A9AAA' }}>학교급식 알레르기 관리</div>
    </div>
    <Col gap={10} style={{ padding:'20px 20px 16px' }}>
      <WTitle text="로그인" />
      <Col gap={6}>
        <div className="wf-label">역할 선택</div>
        <Row gap={4}>
          {['학생','교직원','보호자','영양사'].map((r,i) => (
            <div key={r} style={{ flex:1, border:`1.5px solid ${i===0?'#A8D8E8':'#C0BBB4'}`, background:i===0?'#CFECF3':'transparent',
              color:i===0?'#fff':'#888', fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontSize:10, padding:'4px 0', textAlign:'center', borderRadius:3 }}>{r}</div>
          ))}
        </Row>
      </Col>
      <Col gap={5}>
        <div className="wf-label">이메일</div>
        <Input placeholder="email@school.kr" h={28} />
      </Col>
      <Col gap={5}>
        <div className="wf-label">비밀번호</div>
        <Input placeholder="••••••••" h={28} />
      </Col>
      <Btn label="로그인" primary style={{ width:'100%', height:32, marginTop:4 }} />
      <Divider />
      <Row gap={6} style={{ justifyContent:'center' }}>
        <span className="wf-label">계정이 없으신가요?</span>
        <Btn label="회원가입" small />
      </Row>
    </Col>
    <Anno text="역할 탭으로 폼 항목 분기" />
  </Col>
);

const SignupScreen = () => (
  <Col gap={0} style={{ width:320, height:520, background:'#F8F6F2', border:'1.5px solid #3A3030', overflow:'hidden' }}>
    <SLabel text="SCR-002 · 회원가입 · 데스크탑 A" />
    <div style={{ background:'#CFECF3', width:'100%', height:50, display:'flex', justifyContent:'flex-start', padding:'0 20px', flexDirection:'row', gap:8, alignItems:'center', flexShrink:0 }}>
      <div style={{ fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontWeight:600, fontSize:16, color:'#3A3030' }}>회원가입</div>
      <div style={{ marginLeft:'auto', display:'flex', gap:4 }}>
        {[1,2,3].map(n => (
          <div key={n} style={{ width:22, height:22, borderRadius:'50%',
            background: n===1 ? '#E88FAA' : 'rgba(255,255,255,0.15)',
            display:'flex', alignItems:'center', justifyContent:'center',
            fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontSize:10, color:'#fff' }}>{n}</div>
        ))}
      </div>
    </div>
    <Col gap={10} style={{ padding:'16px 20px' }}>
      <Row gap={4}><span className="wf-label" style={{color:'#E88FAA', fontWeight:600}}>1단계: 기본 정보</span></Row>
      <Col gap={5}><div className="wf-label">이름</div><Input placeholder="홍길동" h={26} /></Col>
      <Col gap={5}><div className="wf-label">이메일</div><Input placeholder="email@school.kr" h={26} /></Col>
      <Col gap={5}><div className="wf-label">비밀번호</div><Input placeholder="8자 이상" h={26} /></Col>
      <Col gap={5}>
        <div className="wf-label">학교 코드</div>
        <Row gap={6}><Input placeholder="학교코드 6자리" h={26} style={{flex:1}} /><Btn label="인증" small /></Row>
      </Col>
      <Col gap={5}>
        <div className="wf-label">학년/반 (학생·교직원)</div>
        <Row gap={6}>
          <Input placeholder="학년" h={26} w={60} />
          <Input placeholder="반" h={26} w={60} />
        </Row>
      </Col>
      <Divider />
      <Row gap={8} style={{ justifyContent:'flex-end' }}>
        <Btn label="다음 단계 →" primary />
      </Row>
    </Col>
    <Anno text="3단계: 기본정보 → 알레르기 등록 → 완료" />
  </Col>
);

/* ═══════════════════════════════════════════════════
   SCR-003  이용자 대시보드
═══════════════════════════════════════════════════ */
const UserDashboardA = () => (
  <Col gap={0} style={{ width:520, height:460, background:'#F8F6F2', border:'1.5px solid #3A3030', overflow:'hidden' }}>
    <SLabel text="SCR-003 · 이용자 대시보드 · 데스크탑 A (상단 탭 바)" />
    <TopNav tabs={['식단','알림','설문','프로필']} active={0} />
    <Col gap={12} style={{ padding:'14px 16px', overflowY:'auto' }}>
      {/* 알레르기 경고 배너 */}
      <div style={{ background:'#FDDDE8', border:'1.5px solid #E06080', borderRadius:4, padding:'8px 12px', display:'flex', alignItems:'flex-start', gap:8 }}>
        <span style={{ fontSize:16 }}>⚠️</span>
        <Col gap={2}>
          <div style={{ fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontWeight:600, fontSize:12, color:'#C04060' }}>오늘 급식에 주의가 필요합니다</div>
          <div style={{ fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontSize:11, color:'#666' }}>갈치조림에 <strong>난류</strong> 포함 · 미역국에 <strong>대두</strong> 포함</div>
        </Col>
        <Btn label="상세보기" small style={{ marginLeft:'auto', flexShrink:0 }} />
      </div>

      {/* 오늘의 식단 요약 */}
      <Col gap={6}>
        <Row gap={6}><WTitle text="오늘의 급식 (5/2 금)" /><span className="wf-label">정규식 · 3교시 후</span></Row>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:6 }}>
          {[
            { name:'잡곡밥', ok:true },
            { name:'미역국', warn:true },
            { name:'갈치조림', warn:true },
            { name:'시금치나물', ok:true },
            { name:'깍두기', ok:true },
            { name:'우유', warn:true },
          ].map((item, i) => (
            <div key={i} style={{ padding:'5px 8px', background: item.warn ? '#FDDDE8' : '#fff',
              border: `1.5px solid ${item.warn ? '#E06080' : '#D8D4CE'}`, borderRadius:3, display:'flex', alignItems:'center', gap:5 }}>
              {item.warn && <span style={{ fontSize:11 }}>⚠</span>}
              <span style={{ fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontSize:11, color: item.warn ? '#C04060' : '#333' }}>{item.name}</span>
            </div>
          ))}
        </div>
      </Col>

      {/* 미응답 설문 */}
      <Col gap={5}>
        <Row gap={6}><WTitle text="미응답 설문" /><span className="wf-badge-orange">1</span></Row>
        <div style={{ padding:'8px 10px', border:'1.5px solid #E88FAA', borderRadius:4, background:'#FFF0F5', display:'flex', alignItems:'center', gap:8 }}>
          <Col gap={2} style={{ flex:1 }}>
            <div style={{ fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontSize:11, fontWeight:600, color:'#3A3030' }}>5/3(토) 대체식 필요 여부</div>
            <div style={{ fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontSize:10, color:'#888' }}>마감: 5/2 오후 6시</div>
          </Col>
          <Btn label="응답하기" primary small />
        </div>
      </Col>
      <Anno text="알레르기 확정 전이면 경고 대신 '알레르기 미등록' 배너" />
    </Col>
  </Col>
);

const UserDashboardMobile = () => (
  <Col gap={0} style={{ width:240, height:480, background:'#F8F6F2', border:'1.5px solid #3A3030', overflow:'hidden' }}>
    <SLabel text="SCR-003 · 이용자 대시보드 · 모바일" />
    <div style={{ background:'#FAFEFF', borderBottom:'1.5px solid #3A3030', padding:'8px 12px', display:'flex', alignItems:'center' }}>
      <div style={{ fontFamily:'Caveat', fontWeight:600, fontSize:15, color:'#3A3030' }}>AllerReAlert</div>
      <Row gap={6} style={{ marginLeft:'auto' }}>
        <span className="wf-badge-red">⚠ 2</span>
        <Fill w={22} h={22} style={{ borderRadius:'50%' }} />
      </Row>
    </div>
    <Col gap={10} style={{ padding:'10px 12px', flex:1, overflowY:'auto' }}>
      <div style={{ background:'#FDDDE8', border:'1px solid #E06080', borderRadius:4, padding:'7px 10px' }}>
        <div style={{ fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontSize:11, fontWeight:600, color:'#C04060' }}>⚠ 오늘 알레르기 주의</div>
        <div style={{ fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontSize:10, color:'#666', marginTop:2 }}>난류·대두 포함 메뉴 2개</div>
      </div>
      <Col gap={5}>
        <WTitle text="오늘 급식" />
        {[{n:'잡곡밥',w:false},{n:'미역국 ⚠',w:true},{n:'갈치조림 ⚠',w:true},{n:'시금치나물',w:false}].map((item,i)=>(
          <div key={i} style={{ padding:'4px 8px', background:item.w?'#FDDDE8':'#fff', border:`1px solid ${item.w?'#E06080':'#ddd'}`, borderRadius:3 }}>
            <span style={{ fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontSize:10, color:item.w?'#C04060':'#333' }}>{item.n}</span>
          </div>
        ))}
      </Col>
      <Col gap={5}>
        <WTitle text="미응답 설문 1건" />
        <div style={{ padding:'6px 8px', border:'1px solid #E88FAA', borderRadius:4, background:'#FFF0F5' }}>
          <div style={{ fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontSize:10, color:'#3A3030', fontWeight:600 }}>5/3 대체식 필요 여부</div>
          <div style={{ fontFamily:"'Noto Sans KR','Noto Sans',sans-serif", fontSize:9, color:'#888' }}>마감 5/2 18:00</div>
          <Btn label="지금 응답" primary small style={{ marginTop:4, width:'100%' }} />
        </div>
      </Col>
    </Col>
    <MobileBottomNav tabs={['홈','식단','설문','알림','내정보']} active={0} />
  </Col>
);

/* ═══════════════════════════════════════════════════
   SCR-004  식단 캘린더
═══════════════════════════════════════════════════ */
const MealCalendarA = () => {
  const days = ['일','월','화','수','목','금','토'];
  const cells = [
    {d:'', meals:[]},{d:'', meals:[]},{d:'', meals:[]},
    {d:'1', meals:['잡곡밥','된장국','삼겹살구이']},
    {d:'2', meals:['흑미밥','미역국','갈치조림'], warn:true},
    {d:'3', meals:[], alt:'대체식'},
    {d:'4', meals:['백미밥','북어국','닭볶음탕']},
    {d:'5', meals:['현미밥','콩나물국','제육볶음']},
    {d:'6', meals:['잡곡밥','시금치국','돼지불고기']},
    {d:'7', meals:['흑미밥','황태국','소불고기'], warn:true},
    {d:'8', meals:[]},{d:'9', meals:[]},
    {d:'10', meals:['흑미밥','동태찌개','삼치구이']},
    {d:'11', meals:['잡곡밥','냉이국','닭갈비'], warn:true},
    ...Array(7).fill({d:'', meals:[]}),
  ];
  return (
    <Col gap={0} style={{ width:580, height:480, background:'#F8F6F2', border:'1.5px solid #3A3030', overflow:'hidden' }}>
      <SLabel text="SCR-004 · 식단 캘린더 · 데스크탑 A (월간 그리드)" />
      <TopNav tabs={['식단','알림','설문','프로필']} active={0} />
      <Col gap={8} style={{ padding:'10px 14px', flex:1 }}>
        <Row gap={8} style={{ justifyContent:'space-between' }}>
          <Row gap={6}><Btn label="< 4월" small /><WTitle text="2026년 5월" /><Btn label="6월 >" small /></Row>
